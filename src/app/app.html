<!--
  Layout root di OrderHub.
  - Sidebar verticale a sinistra (stile CRM, collassabile)
  - <router-outlet /> nell'area di destra (flex-1 occupa lo spazio restante)
  - Spinner globale + ToastContainer come overlay sopra a tutto (Bonus A)
-->
<div class="flex min-h-screen bg-slate-900 text-slate-100">
  <app-sidebar />

  <main class="flex-1 overflow-x-hidden">
    <div class="mx-auto max-w-6xl px-6 py-8">
      <router-outlet />
    </div>
  </main>

  <!--
    Bonus A: overlay globali. Vivono al livello shell, sono sempre
    presenti nel DOM e reagiscono ai signal dei service core.
  -->
  <app-spinner />
  <app-toast-container />
</div>
